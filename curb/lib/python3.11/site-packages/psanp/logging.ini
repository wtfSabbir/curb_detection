[loggers]
keys=root,lowermodule

[handlers]
keys=consoleHandler

[formatters]
keys=json

[logger_root]
level=INFO
handlers=consoleHandler

[logger_lowermodule]
level=INFO
handlers=consoleHandler
qualname=lowermodule

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=json
args=(sys.stdout,)

; [handler_fileHandler]
; class=FileHandler
; level=DEBUG
; formatter=json
; args=("",)

[formatter_json]
class=pythonjsonlogger.jsonlogger.JsonFormatter
format=%(asctime)s %(filename)s %(module)s %(funcName)s %(levelname)s %(message)s %(source_file)s %(parent_file)s %(status)s

; [formatter_simpleFormatter]
; format=%(timestamp)s %(name)s - %(levelname)s:%(message)s